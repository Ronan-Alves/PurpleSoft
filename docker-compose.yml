services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: purplesoft
      POSTGRES_USER: purplesoft
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-purplesoft}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5439}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U purplesoft -d purplesoft"]
      interval: 5s
      timeout: 5s
      retries: 8

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://purplesoft:${POSTGRES_PASSWORD:-purplesoft}@postgres:5432/purplesoft
      CORS_ORIGINS: http://localhost:5178,http://127.0.0.1:5178
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-before-production-8f9f6c7b4f2a4a22}
      OPERATIONAL_EMAIL: ${OPERATIONAL_EMAIL:-gerente@purplebpo.com.br}
      OPERATIONAL_PASSWORD: ${OPERATIONAL_PASSWORD:-purple123}
    ports:
      - "8088:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: http://localhost:8088
    ports:
      - "5178:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
